name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    # capture is macOS-only (avfoundation) + ffmpeg is needed for render tests
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install ffmpeg
        run: brew install ffmpeg
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run format:check
      - run: bun run typecheck
      - run: bun test
      - run: bun run gen:schema && git diff --exit-code packages/core/schema.json
      - name: Build the standalone binary + smoke test
        run: |
          bun run build:cli
          ./dist/agent-video version
