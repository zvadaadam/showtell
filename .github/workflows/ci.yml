name: CI

on:
  push:
    branches: [main]
  pull_request:

# One run per branch/PR: pushing new commits cancels the superseded run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    # capture is macOS-only (avfoundation) + ffmpeg is needed for render tests
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install ffmpeg
        run: brew install ffmpeg
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run format:check
      - run: bun run typecheck
      - run: bun test
      - run: bun run gen:schema && git diff --exit-code packages/core/schema.json packages/core/bundle.schema.json packages/core/manifest.schema.json packages/render/src/hyperframes-sdk.source.txt
      - name: Build the standalone binary + smoke test
        run: |
          bun run build:cli
          ./dist/showtell version
          bun run build:npm
          npm publish ./dist/npm/showtell --dry-run
          npm publish ./dist/npm/showtell-darwin-arm64 --dry-run

  linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: linux-x64
          - runner: ubuntu-24.04-arm
            target: linux-arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install render prerequisites
        run: sudo apt-get update && sudo apt-get install -y ffmpeg espeak-ng
      - run: bun install --frozen-lockfile
      - name: Build and exercise the native package
        run: |
          bun scripts/build-npm-package.ts --target ${{ matrix.target }}
          ./dist/npm/showtell-${{ matrix.target }}/bin/showtell version
          ./dist/npm/showtell-${{ matrix.target }}/bin/showtell render examples/hello.spec.json --frames-only --aspect 16:9 --out .showtell/linux-smoke
          npm publish ./dist/npm/showtell-${{ matrix.target }} --dry-run
