name: Release

# Publishing is deliberate: tags publish npm + GitHub releases. Manual runs are
# dry by default and publish npm only when publish_npm is explicitly enabled.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      publish_npm:
        description: Publish the version in package.json to npm
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}

jobs:
  gates:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
          no-cache: true
      - name: Install ffmpeg
        run: brew install ffmpeg
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run typecheck
      - run: bun test
      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          PKG_VERSION=$(bun -e 'console.log(JSON.parse(await Bun.file("package.json").text()).version)')
          if [ "v$PKG_VERSION" != "${GITHUB_REF_NAME}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package.json version v$PKG_VERSION" >&2
            exit 1
          fi

  native-binary:
    needs: gates
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            target: darwin-arm64
          - runner: ubuntu-latest
            target: linux-x64
          - runner: ubuntu-24.04-arm
            target: linux-arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
          no-cache: true
      - run: bun install --frozen-lockfile
      - name: Build native binary
        run: bun scripts/build-npm-package.ts --target ${{ matrix.target }}
      - name: Smoke test native binary
        run: |
          ./dist/bin/showtell-${{ matrix.target }} version
          ./dist/bin/showtell-${{ matrix.target }} bundle components > /dev/null
      - uses: actions/upload-artifact@v4
        with:
          name: showtell-${{ matrix.target }}
          path: dist/bin/showtell-${{ matrix.target }}
          if-no-files-found: error

  release:
    needs: native-binary
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
          no-cache: true
      - run: bun install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          pattern: showtell-*
          path: dist/bin
          merge-multiple: true
      - name: Assemble release artifacts
        run: bun scripts/build-release.ts --binary-dir dist/bin
      - name: Smoke test the macOS archive
        run: |
          mkdir -p dist/release/native-smoke
          tar -xzf dist/release/showtell-v*-darwin-arm64.tar.gz -C dist/release/native-smoke
          ./dist/release/native-smoke/showtell version
          ./dist/release/native-smoke/showtell bundle components > /dev/null
      - name: Smoke test npm platform selection
        run: |
          VERSION=$(bun -e 'console.log(JSON.parse(await Bun.file("package.json").text()).version)')
          mkdir -p dist/release/npm-smoke
          npm install --prefix dist/release/npm-smoke ./dist/release/showtell-$VERSION.tgz ./dist/release/showtell-darwin-arm64-$VERSION.tgz --ignore-scripts
          ./dist/release/npm-smoke/node_modules/.bin/showtell version
          ./dist/release/npm-smoke/node_modules/.bin/showtell skill install --dir dist/release/npm-smoke/skills
      - uses: actions/setup-node@v6
        if: startsWith(github.ref, 'refs/tags/v') || inputs.publish_npm
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - name: Verify npm publishing identity
        if: startsWith(github.ref, 'refs/tags/v') || inputs.publish_npm
        run: npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish npm packages
        if: startsWith(github.ref, 'refs/tags/v') || inputs.publish_npm
        run: bun scripts/publish-npm.ts --binary-dir dist/bin
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Create GitHub release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/release/showtell-v*.tar.gz
            dist/release/showtell-skill-v*.tar.gz
            dist/release/showtell-*.tgz
            dist/release/SHA256SUMS
          generate_release_notes: true
      - name: Upload artifacts (dry run)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v4
        with:
          name: release-dry-run
          path: dist/release/
          retention-days: 7
