name: Release

# Publishing is DELIBERATE: only a pushed v* tag creates a GitHub Release.
# workflow_dispatch is a dry run — it builds and uploads the artifacts for
# inspection without publishing anything.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}

jobs:
  release:
    # macOS is the supported platform for v0.x (say TTS + AVFoundation capture).
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
          no-cache: true
      - name: Install ffmpeg
        run: brew install ffmpeg
      - run: bun install --frozen-lockfile
      - name: Gates
        run: |
          bun run lint
          bun run typecheck
          bun test
      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          PKG_VERSION=$(bun -e 'console.log(JSON.parse(await Bun.file("package.json").text()).version)')
          if [ "v$PKG_VERSION" != "${GITHUB_REF_NAME}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package.json version v$PKG_VERSION" >&2
            exit 1
          fi
      - name: Build release artifacts
        run: bun scripts/build-release.ts
      - name: Smoke test the arm64 binary
        run: |
          tar -xzf dist/release/agent-video-v*-darwin-arm64.tar.gz -C dist/release
          ./dist/release/agent-video version
          ./dist/release/agent-video bundle components > /dev/null
      - name: Smoke test the x64 binary (Rosetta)
        run: |
          softwareupdate --install-rosetta --agree-to-license || true
          mkdir -p dist/release/x64
          tar -xzf dist/release/agent-video-v*-darwin-x64.tar.gz -C dist/release/x64
          arch -x86_64 ./dist/release/x64/agent-video version
      - name: Create GitHub release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/release/agent-video-v*-darwin-arm64.tar.gz
            dist/release/agent-video-v*-darwin-x64.tar.gz
            dist/release/agent-video-skill-v*.tar.gz
            dist/release/SHA256SUMS
          generate_release_notes: true
      - name: Upload artifacts (dry run)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v4
        with:
          name: release-dry-run
          path: dist/release/
          retention-days: 7
