name: Release

# Publishing is deliberate: tags publish npm + GitHub releases. Manual runs are
# dry by default and publish npm only when publish_npm is explicitly enabled.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      publish_npm:
        description: Publish the version in package.json to npm
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}

jobs:
  gates:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
          no-cache: true
      - name: Install ffmpeg
        run: brew install ffmpeg
      - run: bun install --frozen-lockfile
      - run: bunx playwright install chromium
      - run: bun run check
      - name: Verify release commit is the tip of main
        if: startsWith(github.ref, 'refs/tags/v') || inputs.publish_npm
        run: |
          git fetch origin main --depth=1
          if [ "$(git rev-parse origin/main)" != "$GITHUB_SHA" ]; then
            echo "Releases must run from the current tip of main." >&2
            exit 1
          fi
      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          PKG_VERSION=$(bun -e 'console.log(JSON.parse(await Bun.file("package.json").text()).version)')
          if [ "v$PKG_VERSION" != "${GITHUB_REF_NAME}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package.json version v$PKG_VERSION" >&2
            exit 1
          fi

  native-binary:
    needs: gates
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            target: darwin-arm64
          - runner: ubuntu-latest
            target: linux-x64
          - runner: ubuntu-24.04-arm
            target: linux-arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
          no-cache: true
      - run: bun install --frozen-lockfile
      - name: Install render prerequisites
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            sudo apt-get update && sudo apt-get install -y ffmpeg espeak-ng
          else
            brew install ffmpeg
          fi
      - name: Install pinned Chromium and host dependencies
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            bunx playwright install --with-deps chromium
          else
            bunx playwright install chromium
          fi
      - name: Build native binary
        run: bun scripts/build-npm-package.ts --target ${{ matrix.target }}
      - name: Smoke test native binary
        run: |
          ./dist/bin/showtell-${{ matrix.target }} version
          ./dist/bin/showtell-${{ matrix.target }} bundle components > /dev/null
          test -f dist/bin/showtell-${{ matrix.target }}-browser.tar.gz
          ./dist/npm/showtell-${{ matrix.target }}/bin/showtell bundle runtime > /dev/null
          ./dist/npm/showtell-${{ matrix.target }}/bin/showtell bundle render examples/bundle-v3 --out dist/v3-smoke-${{ matrix.target }} --aspect 16:9 > /dev/null
          V3_OUTPUT=$(find dist/v3-smoke-${{ matrix.target }} -type f -name '*.mp4' | head -1)
          test -n "$V3_OUTPUT"
          ffprobe -v error -select_streams v:0 -show_entries stream=codec_type -of csv=p=0 "$V3_OUTPUT" | grep -qx video
          ffprobe -v error -select_streams a:0 -show_entries stream=codec_type -of csv=p=0 "$V3_OUTPUT" | grep -qx audio
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: showtell-${{ matrix.target }}
          path: |
            dist/bin/showtell-${{ matrix.target }}
            dist/bin/showtell-${{ matrix.target }}-browser.tar.gz
          if-no-files-found: error

  release:
    needs: native-binary
    runs-on: macos-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
          no-cache: true
      - run: bun install --frozen-lockfile
      - name: Install ffmpeg
        run: brew install ffmpeg
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: showtell-*
          path: dist/bin
          merge-multiple: true
      - name: Assemble release artifacts
        run: bun scripts/build-release.ts --binary-dir dist/bin
      - name: Smoke test the macOS archive
        run: |
          mkdir -p dist/release/native-smoke
          tar -xzf dist/release/showtell-v*-darwin-arm64.tar.gz -C dist/release/native-smoke
          ./dist/release/native-smoke/showtell version
          ./dist/release/native-smoke/showtell bundle components > /dev/null
          ./dist/release/native-smoke/showtell bundle runtime > /dev/null
          ./dist/release/native-smoke/showtell bundle render examples/bundle-v3 --out dist/release/native-v3-smoke --aspect 16:9 --stills > /dev/null
          V3_OUTPUT=$(find dist/release/native-v3-smoke -type f -name '*.mp4' | head -1)
          test -n "$V3_OUTPUT"
          ffprobe -v error -select_streams v:0 -show_entries stream=codec_type -of csv=p=0 "$V3_OUTPUT" | grep -qx video
          ffprobe -v error -select_streams a:0 -show_entries stream=codec_type -of csv=p=0 "$V3_OUTPUT" | grep -qx audio
          test -f dist/release/native-smoke/browser/runtime.json
          test -f dist/release/native-smoke/player/_shell.html
      - name: Smoke test npm platform selection
        run: |
          VERSION=$(bun -e 'console.log(JSON.parse(await Bun.file("package.json").text()).version)')
          mkdir -p dist/release/npm-smoke
          npm install --prefix dist/release/npm-smoke ./dist/release/showtell-$VERSION.tgz ./dist/release/showtell-darwin-arm64-$VERSION.tgz --ignore-scripts
          ./dist/release/npm-smoke/node_modules/.bin/showtell version
          test -f dist/release/npm-smoke/node_modules/showtell-darwin-arm64/browser/runtime.json
          ./dist/release/npm-smoke/node_modules/.bin/showtell bundle runtime > /dev/null
          ./dist/release/npm-smoke/node_modules/.bin/showtell skill install --dir dist/release/npm-smoke/skills
          bun -e 'await Bun.write("dist/release/npm-smoke/preview.spec.json", JSON.stringify({meta:{title:"Preview smoke",aspectRatios:["16:9"],repo:{path:"."},tts:{provider:"say"}},scenes:[{kind:"title",content:{heading:"Preview smoke"},narration:"The packaged player is ready.",duration:"auto"}]}))'
          cd dist/release/npm-smoke
          ./node_modules/.bin/showtell preview preview.spec.json --serve-seconds 1
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        if: startsWith(github.ref, 'refs/tags/v') || inputs.publish_npm
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - name: Verify npm publishing identity
        if: startsWith(github.ref, 'refs/tags/v') || inputs.publish_npm
        run: npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish npm packages
        if: startsWith(github.ref, 'refs/tags/v') || inputs.publish_npm
        run: bun scripts/publish-npm.ts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Create GitHub release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            dist/release/showtell-v*.tar.gz
            dist/release/showtell-skill-v*.tar.gz
            dist/release/showtell-*.tgz
            dist/release/SHA256SUMS
          generate_release_notes: true
      - name: Upload artifacts (dry run)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-dry-run
          path: dist/release/
          retention-days: 7
